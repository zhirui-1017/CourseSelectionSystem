    <!-- 添加教师模态框 -->
    <div class="modal" id="addTeacherModal">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">添加教师</h5>
                    <button class="close" data-dismiss="modal">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="modal-body">
                    <form id="addTeacherForm">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label class="form-label" for="teacherId">工号 *</label>
                                    <input type="text" class="form-control" id="teacherId" name="teacherId" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label class="form-label" for="teacherName">姓名 *</label>
                                    <input type="text" class="form-control" id="teacherName" name="teacherName" required>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label class="form-label" for="teacherGender">性别 *</label>
                                    <select class="form-control" id="teacherGender" name="teacherGender" required>
                                        <option value="male">男</option>
                                        <option value="female">女</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label class="form-label" for="teacherCollege">学院 *</label>
                                    <select class="form-control" id="teacherCollege" name="teacherCollege" required>
                                        <option value="">请选择学院>
                                        <option value="computer">计算机学院</option>
                                        <option value="electronic">电子工程学院</option>
                                        <option value="mechanical">机械工程学院</option>
                                        <option value="civil">土木工程学院</option>
                                        <option value="business">商学院</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label class="form-label" for="teacherTitle">职称 *</label>
                                    <select class="form-control" id="teacherTitle" name="teacherTitle" required>
                                        <option value="professor">教授>
                                        <option value="associate_professor">副教授</option>
                                        <option value="lecturer">讲师</option>
                                        <option value="assistant">助教</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label class="form-label" for="hireDate">入职时间 *</label>
                                    <input type="date" class="form-control" id="hireDate" name="hireDate" required>
                                </div>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="teacherEmail">电子邮箱 *</label>
                            <input type="email" class="form-control" id="teacherEmail" name="teacherEmail" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="teacherPhone">手机号码 *</label>
                            <input type="tel" class="form-control" id="teacherPhone" name="teacherPhone" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="teacherOffice">办公地点</label>
                            <input type="text" class="form-control" id="teacherOffice" name="teacherOffice">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-dismiss="modal">取消</button>
                    <button class="btn btn-primary" id="submitAddTeacher">添加</button>
                </div>
            </div>
        </div>
    </div>

                        <label class="form-label">上传文件</label>
                        <div class="file-upload">

                            <p class="text-sm text-muted mt-2">请上传Excel格式的教师信息文件，支持.xlsx和.xls格式</p>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-dismiss="modal">取消</button>
                    <button class="btn btn-primary" id="confirmImportTeachers">开始导入</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 引入公共JavaScript -->
    <script src="/static/js/common.js"></script>
    <script>
        // 页面特定的JavaScript逻辑
        document.addEventListener('DOMContentLoaded', function() {
            // 筛选和搜索功能
            document.getElementById('searchTeacherBtn').addEventListener('click', function() {
                const searchText = document.getElementById('teacherSearch').value.trim();
                // 实现搜索逻辑
                notifications.info('搜索', `搜索教师: ${searchText}`);
            });

            document.getElementById('filterTeacherBtn').addEventListener('click', function() {
                const college = document.getElementById('teacherCollegeFilter').value;
                const title = document.getElementById('teacherTitleFilter').value;
                // 实现筛选逻辑
                notifications.info('筛选', `筛选条件: 学院=${college}, 职称=${title}`);
            });

            // 导出教师数据
            document.getElementById('exportTeachersBtn').addEventListener('click', function() {
                notifications.info('导出', '正在导出教师数据...');
                // 模拟导出延迟
                setTimeout(() => {
                    notifications.success('导出成功', '教师数据已成功导出');
                }, 1500);
            });

            // 添加教师表单提交
            document.getElementById('submitAddTeacher').addEventListener('click', function() {
                const form = document.getElementById('addTeacherForm');
                if (validateForm(form)) {
                    notifications.info('添加', '正在添加教师...');
                    // 模拟添加延迟
                    setTimeout(() => {
                        closeModal(document.getElementById('addTeacherModal'));
                        notifications.success('添加成功', '教师信息已成功添加');
                        form.reset();
                    }, 1500);
                }
            });

            // 编辑教师模态框
            const editButtons = document.querySelectorAll('[data-target="#editTeacherModal"]');
            editButtons.forEach(button => {
                button.addEventListener('click', function() {
                    const teacherId = this.getAttribute('data-id');
                    document.getElementById('editTeacherId').value = teacherId;
                    // 这里应该根据teacherId加载教师数据
                    // 模拟数据加载
                    setTimeout(() => {
                        document.getElementById('editTeacherName').value = '示例教师';
                        document.getElementById('editTeacherGender').value = 'male';
                        // 其他字段...
                    }, 300);
                });
            });

            // 提交编辑表单
            document.getElementById('submitEditTeacher').addEventListener('click', function() {
                const form = document.getElementById('editTeacherForm');
                if (validateForm(form)) {
                    notifications.info('保存', '正在保存教师信息...');
                    // 模拟保存延迟
                    setTimeout(() => {
                        closeModal(document.getElementById('editTeacherModal'));
                        notifications.success('保存成功', '教师信息已成功更新');
                    }, 1500);
                }
            });

            // 重置密码模态框
            const resetButtons = document.querySelectorAll('[data-target="#resetPasswordModal"]');
            resetButtons.forEach(button => {
                button.addEventListener('click', function() {
                    const teacherId = this.getAttribute('data-id');
                    document.getElementById('resetPasswordTeacherId').value = teacherId;
                    document.getElementById('resetPasswordTeacherName').textContent = teacherId;
                });
            });

            // 确认重置密码
            document.getElementById('confirmResetPassword').addEventListener('click', function() {
                notifications.info('重置密码', '正在重置密码...');
                // 模拟重置延迟
                setTimeout(() => {
                    closeModal(document.getElementById('resetPasswordModal'));
                    notifications.success('重置成功', '密码已重置为默认密码');
                }, 1500);
            });

            // 删除教师模态框
            const deleteButtons = document.querySelectorAll('[data-target="#deleteTeacherModal"]');
            deleteButtons.forEach(button => {
                button.addEventListener('click', function() {
                    const teacherId = this.getAttribute('data-id');
                    document.getElementById('deleteTeacherId').value = teacherId;
                    document.getElementById('deleteTeacherName').textContent = teacherId;
                });
            });

            // 确认删除教师
            document.getElementById('confirmDeleteTeacher').addEventListener('click', function() {
                notifications.info('删除', '正在删除教师...');
                // 模拟删除延迟
                setTimeout(() => {
                    closeModal(document.getElementById('deleteTeacherModal'));
                    notifications.success('删除成功', '教师已成功删除');
                }, 1500);
            });

            // 批量导入教师
            document.getElementById('confirmImportTeachers').addEventListener('click', function() {
                const fileInput = document.getElementById('importFile');
                if (!fileInput.files || fileInput.files.length === 0) {
                    notifications.error('导入失败', '请选择要导入的文件');
                    return;
                }
                
                notifications.info('导入', '正在导入教师数据...');
                // 模拟导入延迟
                setTimeout(() => {
                    closeModal(document.getElementById('importTeachersModal'));
                    notifications.success('导入成功', '教师数据已成功导入');
                    fileInput.value = '';
                }, 2000);
            });
        });
    </script>
</body>
</html>
