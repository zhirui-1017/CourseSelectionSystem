<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人信息 - 教师端</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/teacher-dynamic.css">
    <link rel="stylesheet" href="/css/profile-pages.css">
</head>
<body class="teacher-page profile-page" data-profile-role="teacher">
    <div class="page-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="/teacher/index.html" class="sidebar-brand">
                    <div class="sidebar-brand-icon"><i class="fas fa-chalkboard-teacher"></i></div>
                    <span class="sidebar-brand-text">教师端</span>
                </a>
                <button class="sidebar-toggle" type="button" aria-label="收起侧边栏"><i class="fas fa-chevron-left"></i></button>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-item"><a href="/teacher/index.html" class="nav-link"><i class="nav-icon fas fa-house"></i><span class="nav-text">首页</span></a></div>
                <div class="nav-item"><a href="/teacher/course-management.html" class="nav-link"><i class="nav-icon fas fa-book-open"></i><span class="nav-text">课程管理</span></a></div>
                <div class="nav-item"><a href="/teacher/student-management.html" class="nav-link"><i class="nav-icon fas fa-users"></i><span class="nav-text">学生管理</span></a></div>
                <div class="nav-item"><a href="/teacher/grade-management.html" class="nav-link"><i class="nav-icon fas fa-pen-to-square"></i><span class="nav-text">成绩管理</span></a></div>
                <div class="nav-item"><a href="/teacher/teaching-statistics.html" class="nav-link"><i class="nav-icon fas fa-chart-simple"></i><span class="nav-text">教学统计</span></a></div>
                <div class="nav-item"><a href="/teacher/personal-info.html" class="nav-link active"><i class="nav-icon fas fa-user"></i><span class="nav-text">个人信息</span></a></div>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-navbar">
                <div class="nav-left">
                    <button class="mobile-sidebar-toggle" type="button" aria-label="打开侧边栏"><i class="fas fa-bars"></i></button>
                    <h1 class="page-title">个人信息</h1>
                </div>
                <div class="nav-right">
                    <div class="user-profile">
                        <div class="user-avatar" data-profile-avatar>师</div>
                        <div class="user-info">
                            <span class="user-name" data-user-name>教师</span>
                            <span class="user-role" data-user-role>Teacher</span>
                        </div>
                    </div>
                    <a class="btn btn-secondary btn-sm" href="/login/logout"><i class="fas fa-right-from-bracket"></i>退出</a>
                </div>
            </header>

            <div class="content-wrapper">
                <div class="profile-layout">
                    <aside class="profile-summary">
                        <div class="profile-avatar-large" data-profile-avatar>师</div>
                        <h2 data-profile-name>教师</h2>
                        <p data-profile-role-text>Teacher</p>
                        <div class="profile-meta-list">
                            <div class="profile-meta-item">
                                <span class="profile-meta-label" data-profile-id-label>工号</span>
                                <span class="profile-meta-value" data-profile-id-value>-</span>
                            </div>
                            <div class="profile-meta-item">
                                <span class="profile-meta-label">账号状态</span>
                                <span class="profile-meta-value" data-profile-status>-</span>
                            </div>
                        </div>
                        <a class="btn btn-primary" href="#security"><i class="fas fa-key"></i>修改密码</a>
                    </aside>

                    <section>
                        <div class="profile-panel">
                            <div class="profile-panel-header">
                                <h2 class="profile-panel-title"><i class="fas fa-id-card"></i>资料编辑</h2>
                            </div>
                            <div class="profile-panel-body">
                                <form data-profile-form>
                                    <div class="profile-form-grid">
                                        <div class="form-group">
                                            <label class="form-label" for="teacher-no">工号</label>
                                            <input id="teacher-no" class="form-control" name="idNo" type="text" disabled>
                                            <p class="profile-field-note">工号由系统维护，个人页不可修改。</p>
                                        </div>
                                        <div class="form-group">
                                            <label class="form-label" for="teacher-name">姓名</label>
                                            <input id="teacher-name" class="form-control" name="name" type="text" required>
                                        </div>
                                        <div class="form-group">
                                            <label class="form-label" for="teacher-gender">性别</label>
                                            <select id="teacher-gender" class="form-control" name="gender" required>
                                                <option value="男">男</option>
                                                <option value="女">女</option>
                                                <option value="其他">其他</option>
                                            </select>
                                        </div>
                                        <div class="form-group">
                                            <label class="form-label" for="teacher-title">职称</label>
                                            <input id="teacher-title" class="form-control" name="title" type="text">
                                        </div>
                                        <div class="form-group">
                                            <label class="form-label" for="teacher-phone">联系电话</label>
                                            <input id="teacher-phone" class="form-control" name="phone" type="tel" autocomplete="tel">
                                        </div>
                                        <div class="form-group">
                                            <label class="form-label" for="teacher-email">电子邮箱</label>
                                            <input id="teacher-email" class="form-control" name="email" type="email" autocomplete="email">
                                        </div>
                                    </div>
                                    <div class="profile-actions-row">
                                        <button class="btn btn-secondary" type="reset">恢复当前资料</button>
                                        <button class="btn btn-primary" type="submit"><i class="fas fa-floppy-disk"></i>保存资料</button>
                                    </div>
                                </form>
                            </div>
                        </div>

                        <div class="profile-panel">
                            <div class="profile-panel-header">
                                <h2 class="profile-panel-title"><i class="fas fa-circle-info"></i>当前档案</h2>
                            </div>
                            <div class="profile-panel-body">
                                <div class="profile-read-grid" data-profile-readonly>
                                    <div class="profile-read-item"><span class="loading"></span></div>
                                </div>
                            </div>
                        </div>

                        <div class="profile-panel" id="security">
                            <div class="profile-panel-header">
                                <h2 class="profile-panel-title"><i class="fas fa-shield-halved"></i>账号安全</h2>
                            </div>
                            <div class="profile-panel-body">
                                <p class="security-hint">建议定期更新密码，避免与其他系统共用同一密码。</p>
                                <form data-password-form>
                                    <div class="profile-form-grid">
                                        <div class="form-group">
                                            <label class="form-label" for="teacher-old-password">当前密码</label>
                                            <input id="teacher-old-password" class="form-control" name="oldPassword" type="password" required autocomplete="current-password">
                                        </div>
                                        <div class="form-group">
                                            <label class="form-label" for="teacher-new-password">新密码</label>
                                            <input id="teacher-new-password" class="form-control" name="newPassword" type="password" required minlength="6" autocomplete="new-password">
                                        </div>
                                        <div class="form-group full">
                                            <label class="form-label" for="teacher-confirm-password">确认新密码</label>
                                            <input id="teacher-confirm-password" class="form-control" name="confirmPassword" type="password" required minlength="6" autocomplete="new-password">
                                        </div>
                                    </div>
                                    <div class="profile-actions-row">
                                        <button class="btn btn-secondary" type="reset">清空</button>
                                        <button class="btn btn-primary" type="submit"><i class="fas fa-key"></i>修改密码</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </section>
                </div>
            </div>
        </main>
    </div>

    <script src="/js/common.js"></script>
    <script src="/js/app-api.js"></script>
    <script src="/js/profile-settings.js"></script>
</body>
</html>
