    <style>
        /* 课程管理页面特定样式 */
        .course-card {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-backdrop);
            border-radius: var(--radius-lg);
            border: var(--glass-border);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            transition: all var(--transition-normal);
        }
        
        .course-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-glow);
        }
        
        .course-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }
        
        .course-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 0;
            display: flex;
            align-items: center;
        }
        
        .course-icon {
            width: 40px;
            height: 40px;
            background: var(--primary-gradient);
            color: white;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 0.75rem;
            font-size: 1.2rem;
        }
        
        .course-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1rem;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }
        
        .meta-item {
            display: flex;
            align-items: center;
        }
        
        .meta-icon {
            margin-right: 0.5rem;
            color: var(--primary-color);
        }
        
        .capacity-bar {
            height: 6px;
            background: var(--bg-secondary);
            border-radius: 3px;
            margin-top: 0.5rem;
            overflow: hidden;
        }
        
        .capacity-progress {
            height: 100%;
            background: var(--primary-gradient);
            border-radius: 3px;
            transition: width 0.3s ease;
        }
        
        .course-actions {
            display: flex;
            justify-content: flex-end;
            gap: 0.5rem;
            margin-top: 1rem;
        }
        
        .filter-box {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-backdrop);
            border-radius: var(--radius-lg);
            border: var(--glass-border);
            padding: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .operation-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .badge {
            font-weight: normal;
        }
        
        .badge-success {
            background: var(--success-color);
        }
        
        .badge-warning {
            background: var(--warning-color);
        }
    </style>

                    description: '本课程介绍人工智能的基本概念、原理和方法，包括知识表示、搜索技术、机器学习等内容。通过本课程的学习，学生将了解人工智能的发展历程和研究方向，掌握人工智能的基本技术和应用。'
                }
            ];
            
            // 搜索功能
            document.getElementById('search-btn').addEventListener('click', function() {
                const searchTerm = document.getElementById('course-search').value.toLowerCase();
                const semester = document.getElementById('course-semester').value;
                const status = document.getElementById('course-status').value;
                const category = document.getElementById('course-category').value;
                
                // 这里可以添加实际的搜索逻辑
                console.log('搜索课程:', searchTerm, semester, status, category);
                
                // 模拟搜索结果
                alert('搜索功能已触发，实际项目中将连接后端API获取数据');
            });
            
            // 回车键触发搜索
            document.getElementById('course-search').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    document.getElementById('search-btn').click();
                }
            });
            
            // 课程操作按钮事件监听
            const courseCards = document.querySelectorAll('.course-card');
            courseCards.forEach(card => {
                const buttons = card.querySelectorAll('button');
                buttons.forEach(button => {
                    button.addEventListener('click', function() {
                        const courseId = card.querySelector('.course-id').textContent.split(': ')[1];
                        const buttonText = this.textContent.trim();
                        
                        console.log(`对课程 ${courseId} 执行 ${buttonText} 操作`);
                        
                        // 根据按钮类型执行不同操作
                        if (buttonText.includes('学生列表')) {
                            window.location.href = `student-management.html?courseId=${courseId}`;
                        } else if (buttonText.includes('编辑课程')) {
                            // 打开编辑课程模态框
                            alert('编辑课程功能已触发');
                        } else if (buttonText.includes('成绩统计')) {
                            // 跳转到成绩统计页面
                            window.location.href = `grade-management.html?courseId=${courseId}&action=statistics`;
                        }
                    });
                });
            });
            
            // 新建课程按钮事件
            document.querySelector('.btn-success').addEventListener('click', function() {
                alert('新建课程功能已触发');
            });
            
            // 侧边栏导航高亮
            const navLinks = document.querySelectorAll('.sidebar-nav .nav-link');
            navLinks.forEach(link => {
                if (link.getAttribute('href') === 'course-management.html') {
                    link.classList.add('active');
                } else {
                    link.classList.remove('active');
                }
            });
        });
    </script>
</body>
</html>
