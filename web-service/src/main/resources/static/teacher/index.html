<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教师控制台 - 网上选课系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/teacher-dynamic.css">
</head>
<body class="teacher-page" data-teacher-page="dashboard">
    <div class="page-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="/teacher/index.html" class="sidebar-brand">
                    <div class="sidebar-brand-icon"><i class="fas fa-chalkboard-teacher"></i></div>
                    <span class="sidebar-brand-text">教师端</span>
                </a>
                <button class="sidebar-toggle" type="button" aria-label="收起侧边栏">
                    <i class="fas fa-chevron-left"></i>
                </button>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-item"><a href="/teacher/index.html" class="nav-link active"><i class="nav-icon fas fa-house"></i><span class="nav-text">首页</span></a></div>
                <div class="nav-item"><a href="/teacher/course-management.html" class="nav-link"><i class="nav-icon fas fa-book-open"></i><span class="nav-text">课程管理</span></a></div>
                <div class="nav-item"><a href="/teacher/student-management.html" class="nav-link"><i class="nav-icon fas fa-users"></i><span class="nav-text">学生管理</span></a></div>
                <div class="nav-item"><a href="/teacher/grade-management.html" class="nav-link"><i class="nav-icon fas fa-pen-to-square"></i><span class="nav-text">成绩管理</span></a></div>
                <div class="nav-item"><a href="/teacher/teaching-statistics.html" class="nav-link"><i class="nav-icon fas fa-chart-simple"></i><span class="nav-text">教学统计</span></a></div>
                <div class="nav-item"><a href="/teacher/personal-info.html" class="nav-link"><i class="nav-icon fas fa-user"></i><span class="nav-text">个人信息</span></a></div>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-navbar">
                <div class="nav-left">
                    <button class="mobile-sidebar-toggle" type="button" aria-label="打开侧边栏"><i class="fas fa-bars"></i></button>
                    <h1 class="page-title">教师控制台</h1>
                </div>
                <div class="nav-right">
                    <div class="user-profile">
                        <div class="user-avatar" data-teacher-avatar>师</div>
                        <div class="user-info">
                            <span class="user-name" data-teacher-name>教师</span>
                            <span class="user-role" data-teacher-role>Teacher</span>
                        </div>
                    </div>
                    <a class="btn btn-secondary btn-sm" href="/login/logout"><i class="fas fa-right-from-bracket"></i>退出</a>
                </div>
            </header>

            <div class="content-wrapper">
                <section class="stats-grid" data-teacher-stats>
                    <div class="stat-card"><div class="loading"></div></div>
                </section>

                <section class="teacher-two-column">
                    <div class="card">
                        <div class="card-header">
                            <h2 class="card-title">我的课程</h2>
                            <a class="btn btn-primary btn-sm" href="/teacher/course-management.html"><i class="fas fa-arrow-right"></i>查看全部</a>
                        </div>
                        <div class="card-body">
                            <div class="teacher-course-grid" data-dashboard-courses></div>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-header">
                            <h2 class="card-title">最近选课</h2>
                            <span class="teacher-table-note">按选课时间排序</span>
                        </div>
                        <div class="card-body">
                            <div class="table-container">
                                <table class="data-table">
                                    <thead>
                                        <tr>
                                            <th>课程</th>
                                            <th>学号</th>
                                            <th>姓名</th>
                                            <th>班级</th>
                                            <th>选课时间</th>
                                        </tr>
                                    </thead>
                                    <tbody data-recent-students>
                                        <tr><td colspan="5" class="text-center"><span class="loading"></span></td></tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script src="/js/common.js"></script>
    <script src="/js/app-api.js"></script>
    <script src="/js/teacher-dashboard.js"></script>
</body>
</html>
