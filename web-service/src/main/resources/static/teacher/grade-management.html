    <style>
        /* 成绩管理页面特定样式 */
        .grade-table {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-backdrop);
            border-radius: var(--radius-lg);
            border: var(--glass-border);
            overflow: hidden;
        }
        
        .grade-table thead th {
            background: var(--bg-secondary);
            font-weight: 600;
            color: var(--text-primary);
            border-bottom: none;
        }
        
        .grade-table tbody tr {
            transition: background-color var(--transition-fast);
        }
        
        .grade-table tbody tr:hover {
            background-color: var(--bg-hover);
        }
        
        .filter-box {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-backdrop);
            border-radius: var(--radius-lg);
            border: var(--glass-border);
            padding: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .grade-input {
            width: 70px;
            text-align: center;
        }
        
        .grade-cell {
            position: relative;
        }
        
        .grade-tooltip {
            position: absolute;
            bottom: 125%;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-secondary);
            color: var(--text-primary);
            padding: 0.5rem 1rem;
            border-radius: var(--radius-md);
            white-space: nowrap;
            font-size: 0.875rem;
            opacity: 0;
            visibility: hidden;
            transition: all var(--transition-fast);
            z-index: 1000;
        }
        
        .grade-tooltip::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border: 6px solid transparent;
            border-top-color: var(--bg-secondary);
        }
        
        .grade-cell:hover .grade-tooltip {
            opacity: 1;
            visibility: visible;
        }
        
        .chart-container {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-backdrop);
            border-radius: var(--radius-lg);
            border: var(--glass-border);
            padding: 1.5rem;
            height: 400px;
        }
        
        .statistics-card {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-backdrop);
            border-radius: var(--radius-lg);
            border: var(--glass-border);
            padding: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .grade-range {
            position: relative;
            width: 100%;
            height: 10px;
            border-radius: 5px;
            background: linear-gradient(to right, 
                var(--success-color) 0%, 
                var(--success-color) 20%, 
                var(--warning-color) 20%, 
                var(--warning-color) 40%, 
                var(--info-color) 40%, 
                var(--info-color) 60%, 
                var(--warning-color) 60%, 
                var(--warning-color) 80%, 
                var(--danger-color) 80%, 
                var(--danger-color) 100%);
        }
    </style>

    <script>
        // 成绩管理页面的JavaScript逻辑
        document.addEventListener('DOMContentLoaded', function() {
            // 侧边栏导航高亮
            const navLinks = document.querySelectorAll('.sidebar-nav .nav-link');
            navLinks.forEach(link => {
                if (link.getAttribute('href') === 'grade-management.html') {
                    link.classList.add('active');
                } else {
                    link.classList.remove('active');
                }
            });
            
            // 初始化图表
            initCharts();
            
            // 搜索功能
            document.getElementById('search-btn').addEventListener('click', function() {
                const searchTerm = document.getElementById('student-search').value.toLowerCase();
                const courseId = document.getElementById('course-select').value;
                const gradeType = document.getElementById('grade-type').value;
                const semester = document.getElementById('grade-semester').value;
                
                console.log('搜索成绩:', searchTerm, courseId, gradeType, semester);
                // 在实际项目中，这里会根据搜索条件加载成绩数据
            });
            
            // 回车键触发搜索
            document.getElementById('student-search').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    document.getElementById('search-btn').click();
                }
            });
            
            // 成绩输入框事件监听
            const gradeInputs = document.querySelectorAll('.grade-input');
            gradeInputs.forEach(input => {
                input.addEventListener('change', function() {
                    updateFinalGrade(this.closest('tr'));
                });
            });
            
            // 保存按钮事件
            const saveButtons = document.querySelectorAll('.btn-sm.btn-primary');
            saveButtons.forEach(button => {
                button.addEventListener('click', function() {
                    const row = this.closest('tr');
                    const studentId = row.dataset.studentId;
                    saveStudentGrade(studentId, row);
                });
            });
            
            // 历史记录按钮事件
            const historyButtons = document.querySelectorAll('.btn-sm.btn-secondary');
            historyButtons.forEach(button => {
                button.addEventListener('click', function() {
                    const row = this.closest('tr');
                    const studentId = row.dataset.studentId;
                    showGradeHistory(studentId);
                });
            });
            
            // 批量保存按钮事件
            document.querySelector('.btn-primary:contains("批量保存")').addEventListener('click', function() {
                saveAllGrades();
            });
            
            // 导出成绩按钮事件
            document.querySelector('.btn-secondary:contains("导出成绩")').addEventListener('click', function() {
                exportGrades();
            });
            
            // 导入成绩按钮事件
            document.querySelector('.btn-secondary:contains("导入成绩")').addEventListener('click', function() {
                importGrades();
            });
        });
        
        // 更新总评成绩
        function updateFinalGrade(row) {
            const dailyGrade = parseFloat(row.querySelector('.daily-grade').value) || 0;
            const labGrade = parseFloat(row.querySelector('.lab-grade').value) || 0;
            const examGrade = parseFloat(row.querySelector('.exam-grade').value) || 0;
            
            // 计算总评成绩: 平时成绩(40%) + 实验成绩(20%) + 考试成绩(40%)
            const finalGrade = dailyGrade * 0.4 + labGrade * 0.2 + examGrade * 0.4;
            
            // 更新总评成绩显示
            const finalGradeElement = row.querySelector('.final-grade');
            finalGradeElement.textContent = finalGrade.toFixed(1);
            
            // 更新等级
            updateGradeLevel(row, finalGrade);
        }
        
        // 更新成绩等级
        function updateGradeLevel(row, finalGrade) {
            const gradeLevelElement = row.querySelector('.badge');
            
            if (finalGrade >= 90) {
                gradeLevelElement.textContent = '优秀';
                gradeLevelElement.className = 'badge badge-primary';
            } else if (finalGrade >= 80) {
                gradeLevelElement.textContent = '良好';
                gradeLevelElement.className = 'badge badge-success';
            } else if (finalGrade >= 70) {
                gradeLevelElement.textContent = '中等';
                gradeLevelElement.className = 'badge badge-info';
            } else if (finalGrade >= 60) {
                gradeLevelElement.textContent = '及格';
                gradeLevelElement.className = 'badge badge-warning';
            } else {
                gradeLevelElement.textContent = '不及格';
                gradeLevelElement.className = 'badge badge-danger';
            }
        }
        
        // 保存学生成绩
        function saveStudentGrade(studentId, row) {
            const dailyGrade = parseFloat(row.querySelector('.daily-grade').value) || 0;
            const labGrade = parseFloat(row.querySelector('.lab-grade').value) || 0;
            const examGrade = parseFloat(row.querySelector('.exam-grade').value) || 0;
            const finalGrade = parseFloat(row.querySelector('.final-grade').textContent) || 0;
            const remark = row.querySelector('.remark').value || '';
            
            console.log('保存学生成绩:', studentId, { dailyGrade, labGrade, examGrade, finalGrade, remark });
            
            // 模拟保存成功提示
            alert(`已保存学生 ${studentId} 的成绩`);
        }
        
        // 批量保存所有成绩
        function saveAllGrades() {
            const rows = document.querySelectorAll('#grade-list tr');
            const gradesToSave = [];
            
            rows.forEach(row => {
                const studentId = row.dataset.studentId;
                const dailyGrade = parseFloat(row.querySelector('.daily-grade').value) || 0;
                const labGrade = parseFloat(row.querySelector('.lab-grade').value) || 0;
                const examGrade = parseFloat(row.querySelector('.exam-grade').value) || 0;
                const finalGrade = parseFloat(row.querySelector('.final-grade').textContent) || 0;
                const remark = row.querySelector('.remark').value || '';
                
                gradesToSave.push({
                    studentId,
                    dailyGrade,
                    labGrade,
                    examGrade,
                    finalGrade,
                    remark
                });
            });
            
            console.log('批量保存成绩:', gradesToSave);
            alert(`已批量保存 ${gradesToSave.length} 条成绩记录`);
        }
        
        // 显示成绩历史
        function showGradeHistory(studentId) {
            console.log('查看成绩历史:', studentId);
            // 在实际项目中，这里会根据学生ID加载成绩历史
            const gradeHistoryModal = new bootstrap.Modal(document.getElementById('grade-history-modal'));
            gradeHistoryModal.show();
        }
        
        // 导出成绩
        function exportGrades() {
            const courseId = document.getElementById('course-select').value;
            const semester = document.getElementById('grade-semester').value;
            
            console.log('导出成绩:', { courseId, semester });
            alert('成绩导出功能已触发');
        }
        
        // 导入成绩
        function importGrades() {
            const courseId = document.getElementById('course-select').value;
            const semester = document.getElementById('grade-semester').value;
            
            console.log('导入成绩:', { courseId, semester });
            alert('成绩导入功能已触发');
        }
        
        // 初始化图表
        function initCharts() {
            // 成绩分布图表
            const distributionCtx = document.getElementById('gradeDistributionChart').getContext('2d');
            new Chart(distributionCtx, {
                type: 'bar',
                data: {
                    labels: ['90-100', '80-89', '70-79', '60-69', '60以下'],
                    datasets: [{
                        label: '学生人数',
                        data: [12, 24, 10, 6, 4],
                        backgroundColor: [
                            'rgba(54, 162, 235, 0.7)',
                            'rgba(75, 192, 192, 0.7)',
                            'rgba(255, 206, 86, 0.7)',
                            'rgba(255, 159, 64, 0.7)',
                            'rgba(255, 99, 132, 0.7)'
                        ],
                        borderColor: [
                            'rgba(54, 162, 235, 1)',
                            'rgba(75, 192, 192, 1)',
                            'rgba(255, 206, 86, 1)',
                            'rgba(255, 159, 64, 1)',
                            'rgba(255, 99, 132, 1)'
                        ],
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                precision: 0
                            }
                        }
                    }
                }
            });
            
            // 成绩概览图表
            const overviewCtx = document.getElementById('gradeOverviewChart').getContext('2d');
            new Chart(overviewCtx, {
                type: 'doughnut',
                data: {
                    labels: ['优秀', '良好', '中等', '及格', '不及格'],
                    datasets: [{
                        data: [12, 24, 10, 6, 4],
                        backgroundColor: [
                            'rgba(54, 162, 235, 0.7)',
                            'rgba(75, 192, 192, 0.7)',
                            'rgba(255, 206, 86, 0.7)',
                            'rgba(255, 159, 64, 0.7)',
                            'rgba(255, 99, 132, 0.7)'
                        ],
                        borderColor: [
                            'rgba(54, 162, 235, 1)',
                            'rgba(75, 192, 192, 1)',
                            'rgba(255, 206, 86, 1)',
                            'rgba(255, 159, 64, 1)',
                            'rgba(255, 99, 132, 1)'
                        ],
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'right'
                        }
                    }
                }
            });
        }
    </script>
