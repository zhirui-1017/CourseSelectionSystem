<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成绩管理 - 教师端</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/teacher-dynamic.css">
</head>
<body class="teacher-page" data-teacher-page="grades">
    <div class="page-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="/teacher/index.html" class="sidebar-brand">
                    <div class="sidebar-brand-icon"><i class="fas fa-chalkboard-teacher"></i></div>
                    <span class="sidebar-brand-text">教师端</span>
                </a>
                <button class="sidebar-toggle" type="button" aria-label="收起侧边栏"><i class="fas fa-chevron-left"></i></button>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-item"><a href="/teacher/index.html" class="nav-link"><i class="nav-icon fas fa-house"></i><span class="nav-text">首页</span></a></div>
                <div class="nav-item"><a href="/teacher/course-management.html" class="nav-link"><i class="nav-icon fas fa-book-open"></i><span class="nav-text">课程管理</span></a></div>
                <div class="nav-item"><a href="/teacher/student-management.html" class="nav-link"><i class="nav-icon fas fa-users"></i><span class="nav-text">学生管理</span></a></div>
                <div class="nav-item"><a href="/teacher/grade-management.html" class="nav-link active"><i class="nav-icon fas fa-pen-to-square"></i><span class="nav-text">成绩管理</span></a></div>
                <div class="nav-item"><a href="/teacher/teaching-statistics.html" class="nav-link"><i class="nav-icon fas fa-chart-simple"></i><span class="nav-text">教学统计</span></a></div>
                <div class="nav-item"><a href="/teacher/personal-info.html" class="nav-link"><i class="nav-icon fas fa-user"></i><span class="nav-text">个人信息</span></a></div>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-navbar">
                <div class="nav-left">
                    <button class="mobile-sidebar-toggle" type="button" aria-label="打开侧边栏"><i class="fas fa-bars"></i></button>
                    <h1 class="page-title">成绩管理</h1>
                </div>
                <div class="nav-right">
                    <div class="user-profile">
                        <div class="user-avatar" data-teacher-avatar>师</div>
                        <div class="user-info">
                            <span class="user-name" data-teacher-name>教师</span>
                            <span class="user-role" data-teacher-role>Teacher</span>
                        </div>
                    </div>
                    <a class="btn btn-secondary btn-sm" href="/login/logout"><i class="fas fa-right-from-bracket"></i>退出</a>
                </div>
            </header>

            <div class="content-wrapper">
                <div class="teacher-two-column">
                    <div class="card">
                        <div class="card-header">
                            <div>
                                <h2 class="card-title" data-grade-course-title>成绩录入</h2>
                                <div class="teacher-table-note">有效选课学生 <strong data-grade-count>0</strong> 人</div>
                            </div>
                            <button class="btn btn-primary btn-sm" type="button" data-batch-save><i class="fas fa-floppy-disk"></i>批量保存</button>
                        </div>
                        <div class="card-body">
                            <div class="teacher-filter compact">
                                <div class="form-group">
                                    <label class="form-label" for="course-select">选择课程</label>
                                    <select id="course-select" class="form-control"></select>
                                </div>
                                <div class="form-group">
                                    <label class="form-label" for="grade-status">录入状态</label>
                                    <select id="grade-status" class="form-control" data-grade-status>
                                        <option value="">全部</option>
                                        <option value="graded">已录入</option>
                                        <option value="ungraded">未录入</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label class="form-label" for="grade-search">搜索学生</label>
                                    <input id="grade-search" class="form-control" type="search" placeholder="姓名或学号" data-grade-search>
                                </div>
                                <button class="btn btn-primary" type="button"><i class="fas fa-search"></i>筛选</button>
                            </div>

                            <div class="table-container">
                                <table class="data-table">
                                    <thead>
                                        <tr>
                                            <th>学生</th>
                                            <th>平时</th>
                                            <th>实验</th>
                                            <th>考试</th>
                                            <th>总评</th>
                                            <th>等级</th>
                                            <th>备注</th>
                                            <th>操作</th>
                                        </tr>
                                    </thead>
                                    <tbody data-grade-list>
                                        <tr><td colspan="8" class="text-center"><span class="loading"></span></td></tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    <aside class="card">
                        <div class="card-header">
                            <h2 class="card-title">成绩概览</h2>
                            <span class="teacher-table-note">平均分 <strong data-grade-average>-</strong></span>
                        </div>
                        <div class="card-body">
                            <div class="teacher-distribution" data-grade-distribution>
                                <div class="teacher-empty">暂无成绩数据</div>
                            </div>
                            <div class="teacher-table-note mt-4">
                                总评 = 平时成绩 40% + 实验成绩 20% + 考试成绩 40%。
                            </div>
                        </div>
                    </aside>
                </div>
            </div>
        </main>
    </div>

    <script src="/js/common.js"></script>
    <script src="/js/app-api.js"></script>
    <script src="/js/teacher-dashboard.js"></script>
</body>
</html>
