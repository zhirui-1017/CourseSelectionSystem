<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设置 - 学生端</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/common.css">
    <style>
        .settings-page .content-wrapper {
            max-width: 1120px;
            margin: 0 auto;
        }

        .settings-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: var(--spacing-lg);
        }

        .settings-tile {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: var(--spacing-lg);
            padding: var(--spacing-xl);
            color: inherit;
            text-decoration: none;
            background: var(--glass-bg);
            border: 1px solid var(--border-light);
            border-radius: 8px;
            box-shadow: var(--shadow-sm);
            transition: transform var(--transition-fast), box-shadow var(--transition-fast), border-color var(--transition-fast);
        }

        .settings-tile:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow);
            border-color: rgba(52, 152, 219, 0.35);
        }

        .settings-tile-main {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            min-width: 0;
        }

        .settings-tile-icon {
            width: 48px;
            height: 48px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-light);
            background: var(--primary-gradient);
            font-size: var(--font-size-xl);
            flex: 0 0 auto;
        }

        .settings-tile h2 {
            margin: 0 0 var(--spacing-xs);
            color: var(--text-primary);
            font-size: var(--font-size-lg);
        }

        .settings-tile p {
            margin: 0;
            color: var(--text-secondary);
            font-size: var(--font-size-sm);
        }

        .settings-tile-arrow {
            color: var(--text-secondary);
            font-size: var(--font-size-lg);
        }

        @media (max-width: 760px) {
            .settings-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body class="settings-page">
    <div class="page-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="/student/index.html" class="sidebar-brand">
                    <div class="sidebar-brand-icon"><i class="fas fa-graduation-cap"></i></div>
                    <span class="sidebar-brand-text">学生端</span>
                </a>
                <button class="sidebar-toggle" type="button" aria-label="收起侧边栏"><i class="fas fa-chevron-left"></i></button>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-item"><a href="/student/index.html" class="nav-link"><i class="nav-icon fas fa-home"></i><span class="nav-text">首页</span></a></div>
                <div class="nav-item"><a href="/student/my-courses.html" class="nav-link"><i class="nav-icon fas fa-book"></i><span class="nav-text">我的课程</span></a></div>
                <div class="nav-item"><a href="/student/course-selection.html" class="nav-link"><i class="nav-icon fas fa-search"></i><span class="nav-text">课程选择</span></a></div>
                <div class="nav-item"><a href="/student/grades.html" class="nav-link"><i class="nav-icon fas fa-chart-line"></i><span class="nav-text">成绩查询</span></a></div>
                <div class="nav-item"><a href="/student/profile.html" class="nav-link"><i class="nav-icon fas fa-user"></i><span class="nav-text">个人信息</span></a></div>
                <div class="nav-item"><a href="/student/settings.html" class="nav-link active"><i class="nav-icon fas fa-cog"></i><span class="nav-text">设置</span></a></div>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-navbar">
                <div class="nav-left">
                    <button class="mobile-sidebar-toggle" type="button" aria-label="打开侧边栏"><i class="fas fa-bars"></i></button>
                    <h1 class="page-title">设置</h1>
                </div>
                <div class="nav-right">
                    <a class="btn btn-secondary btn-sm" href="/login/logout"><i class="fas fa-right-from-bracket"></i>退出</a>
                </div>
            </header>

            <div class="content-wrapper">
                <div class="settings-grid">
                    <a class="settings-tile" href="/student/profile.html">
                        <div class="settings-tile-main">
                            <div class="settings-tile-icon"><i class="fas fa-id-card"></i></div>
                            <div>
                                <h2>账户资料</h2>
                                <p>姓名、性别、电话、邮箱</p>
                            </div>
                        </div>
                        <i class="settings-tile-arrow fas fa-arrow-right"></i>
                    </a>
                    <a class="settings-tile" href="/student/profile.html#security">
                        <div class="settings-tile-main">
                            <div class="settings-tile-icon"><i class="fas fa-key"></i></div>
                            <div>
                                <h2>账号安全</h2>
                                <p>修改当前登录密码</p>
                            </div>
                        </div>
                        <i class="settings-tile-arrow fas fa-arrow-right"></i>
                    </a>
                </div>
            </div>
        </main>
    </div>

    <script src="/js/common.js"></script>
</body>
</html>
