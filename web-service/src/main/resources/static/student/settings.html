    <style>
        /* 设置页面主容器 */
        .settings-container {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: var(--spacing-xl);
            margin-bottom: var(--spacing-xl);
        }
        
        /* 设置侧边栏样式 */
        .settings-sidebar {
            background: var(--glass-bg);
            border-radius: var(--radius-lg);
            border: var(--glass-border);
            backdrop-filter: var(--glass-backdrop);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            height: calc(100vh - var(--top-nav-height) - var(--spacing-xl) * 2);
            position: sticky;
            top: calc(var(--top-nav-height) + var(--spacing-xl));
        }
        
        .sidebar-nav {
            padding: var(--spacing-md);
        }
        
        .sidebar-nav-item {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            padding: var(--spacing-sm) var(--spacing-md);
            border-radius: var(--radius-md);
            margin-bottom: var(--spacing-xs);
            cursor: pointer;
            color: var(--text-primary);
            font-size: var(--font-size-sm);
            font-weight: 500;
            transition: all var(--transition-normal);
            text-decoration: none;
        }
        
        .sidebar-nav-item:hover {
            background-color: var(--gray-100);
            color: var(--primary-color);
        }
        
        .sidebar-nav-item.active {
            background-color: var(--primary-light);
            color: var(--primary-color);
        }
        
        .sidebar-nav-icon {
            font-size: var(--font-size-md);
            width: 24px;
            text-align: center;
        }
        
        /* 设置内容区域 */
        .settings-content {
            background: var(--glass-bg);
            border-radius: var(--radius-lg);
            border: var(--glass-border);
            backdrop-filter: var(--glass-backdrop);
            box-shadow: var(--shadow);
            padding: var(--spacing-xl);
        }
        
        .settings-header {
            margin-bottom: var(--spacing-xl);
            padding-bottom: var(--spacing-lg);
            border-bottom: 1px solid var(--border-color);
        }
        
        .settings-title {
            font-size: var(--font-size-xl);
            font-weight: 600;
            color: var(--text-primary);
            margin: 0 0 var(--spacing-sm) 0;
        }
        
        .settings-description {
            font-size: var(--font-size-sm);
            color: var(--text-secondary);
            margin: 0;
        }
        
        /* 设置表单样式 */
        .settings-form {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: var(--spacing-xl);
        }
        
        .form-section {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-lg);
        }
        
        .section-title {
            font-size: var(--font-size-md);
            font-weight: 600;
            color: var(--text-primary);
            margin: 0;
            padding-bottom: var(--spacing-sm);
            border-bottom: 1px solid var(--border-color);
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-xs);
        }
        
        .form-label {
            font-size: var(--font-size-sm);
            font-weight: 500;
            color: var(--text-primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .form-description {
            font-size: var(--font-size-xs);
            color: var(--text-secondary);
            margin-top: calc(-1 * var(--spacing-xs));
            margin-bottom: var(--spacing-xs);
        }
        
        .form-input, 
        .form-select, 
        .form-textarea {
            padding: var(--spacing-sm) var(--spacing-md);
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            background-color: var(--white);
            font-size: var(--font-size-sm);
            transition: border-color var(--transition-normal);
        }
        
        .form-input:focus, 
        .form-select:focus, 
        .form-textarea:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        
        .form-textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        .form-input:disabled {
            background-color: var(--gray-100);
            color: var(--text-secondary);
            cursor: not-allowed;
        }
        
        /* 开关组件样式 */
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }
        
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--gray-300);
            border-radius: 34px;
            transition: .4s;
        }
        
        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            border-radius: 50%;
            transition: .4s;
        }
        
        input:checked + .toggle-slider {
            background-color: var(--primary-color);
        }
        
        input:checked + .toggle-slider:before {
            transform: translateX(26px);
        }
        
        /* 颜色选择器样式 */
        .color-picker-group {
            display: flex;
            gap: var(--spacing-sm);
            flex-wrap: wrap;
        }
        
        .color-option {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: all var(--transition-normal);
        }
        
        .color-option:hover {
            transform: scale(1.1);
        }
        
        .color-option.selected {
            border-color: var(--text-primary);
            transform: scale(1.1);
        }
        
        /* 按钮组样式 */
        .form-actions {
            display: flex;
            gap: var(--spacing-md);
            justify-content: flex-end;
            margin-top: var(--spacing-xl);
            padding-top: var(--spacing-xl);
            border-top: 1px solid var(--border-color);
        }
        
        .btn {
            padding: var(--spacing-sm) var(--spacing-lg);
            border-radius: var(--radius-md);
            font-size: var(--font-size-sm);
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition-normal);
            border: none;
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
        }
        
        .btn-primary {
            background-color: var(--primary-color);
            color: var(--white);
        }
        
        .btn-primary:hover {
            background-color: var(--primary-dark);
        }
        
        .btn-outline {
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
        }
        
        .btn-outline:hover {
            background-color: var(--gray-100);
            border-color: var(--gray-300);
        }
        
        .btn-danger {
            background-color: var(--danger-color);
            color: var(--white);
        }
        
        .btn-danger:hover {
            background-color: var(--danger-dark);
        }
        
        /* 卡片组件样式 */
        .info-card {
            background: var(--glass-bg);
            border-radius: var(--radius-lg);
            border: var(--glass-border);
            backdrop-filter: var(--glass-backdrop);
            box-shadow: var(--shadow);
            padding: var(--spacing-lg);
            margin-top: var(--spacing-lg);
        }
        
        .info-card-title {
            font-size: var(--font-size-sm);
            font-weight: 600;
            color: var(--primary-color);
            margin: 0 0 var(--spacing-sm) 0;
        }
        
        .info-card-content {
            font-size: var(--font-size-xs);
            color: var(--text-secondary);
            line-height: 1.6;
            margin: 0;
        }
        
        /* 模态框样式 */
        .modal-backdrop {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal {
            background: var(--glass-bg);
            border-radius: var(--radius-lg);
            border: var(--glass-border);
            backdrop-filter: var(--glass-backdrop);
            box-shadow: var(--shadow-lg);
            padding: var(--spacing-xl);
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: var(--spacing-lg);
            padding-bottom: var(--spacing-md);
            border-bottom: 1px solid var(--border-color);
        }
        
        .modal-title {
            font-size: var(--font-size-lg);
            font-weight: 600;
            color: var(--text-primary);
            margin: 0;
        }
        
        .close-modal-button {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: var(--text-secondary);
            cursor: pointer;
            padding: var(--spacing-xs);
            border-radius: var(--radius-sm);
            transition: color var(--transition-normal);
        }
        
        .close-modal-button:hover {
            color: var(--text-primary);
        }
        
        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: var(--spacing-md);
            margin-top: var(--spacing-lg);
            padding-top: var(--spacing-lg);
            border-top: 1px solid var(--border-color);
        }
        
        /* 安全问题样式 */
        .security-question {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            padding: var(--spacing-md);
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            margin-bottom: var(--spacing-md);
        }
        
        .security-question-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--primary-light);
            color: var(--primary-color);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: var(--font-size-md);
        }
        
        .security-question-content {
            flex: 1;
        }
        
        .security-question-title {
            font-size: var(--font-size-sm);
            font-weight: 500;
            color: var(--text-primary);
            margin: 0 0 var(--spacing-xs) 0;
        }
        
        .security-question-status {
            font-size: var(--font-size-xs);
            color: var(--text-secondary);
            margin: 0;
        }
        
        .security-question-action {
            padding: var(--spacing-xs) var(--spacing-sm);
            border-radius: var(--radius-sm);
            background-color: var(--primary-light);
            color: var(--primary-color);
            font-size: var(--font-size-xs);
            font-weight: 500;
            text-decoration: none;
            transition: all var(--transition-normal);
        }
        
        .security-question-action:hover {
            background-color: var(--primary-color);
            color: var(--white);
        }
        
        /* 移动端响应式 */
        @media (max-width: 992px) {
            .settings-container {
                grid-template-columns: 1fr;
            }
            
            .settings-sidebar {
                height: auto;
                position: static;
            }
            
            .settings-form {
                grid-template-columns: 1fr;
            }
        }
        
        @media (max-width: 768px) {
            .settings-content {
                padding: var(--spacing-lg);
            }
            
            .modal {
                width: 95%;
                padding: var(--spacing-lg);
            }
            
            .modal-footer, .form-actions {
                flex-direction: column-reverse;
            }
            
            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>

                    <div class="form-group">
                        <label class="form-label">确认新密码</label>
                        <input type="password" class="form-input" placeholder="请再次输入新密码">
                    </div>
                </div>
            </form>
            
            <div class="modal-footer">
                <button type="button" class="btn btn-outline close-change-password">取消</button>
                <button type="button" class="btn btn-primary change-password-button">
                    <i class="fas fa-key"></i> 修改密码
                </button>
            </div>
        </div>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 获取DOM元素
            const sidebarNavItems = document.querySelectorAll('.sidebar-nav-item');
            const saveButton = document.querySelector('.save-button');
            const cancelButton = document.querySelector('.cancel-button');
            const changePasswordBackdrop = document.querySelector('.change-password-modal-backdrop');
            const closeChangePasswordButtons = document.querySelectorAll('.close-change-password');
            const changePasswordButton = document.querySelector('.change-password-button');
            
            // 设置侧边栏导航切换
            sidebarNavItems.forEach(item => {
                item.addEventListener('click', function(e) {
                    e.preventDefault();
                    sidebarNavItems.forEach(navItem => navItem.classList.remove('active'));
                    this.classList.add('active');
                    
                    // 在实际应用中，这里应该根据点击的导航项切换内容区域
                    console.log('选择了设置项:', this.textContent.trim());
                });
            });
            
            // 保存设置
            saveButton.addEventListener('click', function() {
                // 在实际应用中，这里应该进行表单验证和数据提交
                alert('设置已保存！');
            });
            
            // 取消修改
            cancelButton.addEventListener('click', function() {
                // 在实际应用中，这里应该恢复表单原始数据
                if (confirm('确定要放弃所有修改吗？')) {
                    // 表单重置逻辑
                    console.log('已放弃修改');
                }
            });
            
            // 修改密码按钮（在实际应用中应该有一个触发这个模态框的按钮）
            // 这里为了演示，添加一个临时按钮
            const tempChangePasswordBtn = document.createElement('button');
            tempChangePasswordBtn.className = 'btn btn-outline';
            tempChangePasswordBtn.textContent = '修改密码';
            tempChangePasswordBtn.style.position = 'absolute';
            tempChangePasswordBtn.style.top = '20px';
            tempChangePasswordBtn.style.right = '20px';
            document.querySelector('.settings-content').appendChild(tempChangePasswordBtn);
            
            // 打开修改密码模态框
            tempChangePasswordBtn.addEventListener('click', function() {
                changePasswordBackdrop.style.display = 'flex';
            });
            
            // 关闭修改密码模态框
            closeChangePasswordButtons.forEach(button => {
                button.addEventListener('click', function() {
                    changePasswordBackdrop.style.display = 'none';
                });
            });
            
            // 点击模态框背景关闭
            changePasswordBackdrop.addEventListener('click', function(e) {
                if (e.target === this) {
                    changePasswordBackdrop.style.display = 'none';
                }
            });
            
            // 修改密码
            changePasswordButton.addEventListener('click', function() {
                // 在实际应用中，这里应该进行密码验证和修改
                alert('密码修改成功！请重新登录。');
                changePasswordBackdrop.style.display = 'none';
            });
            
            // 键盘事件处理
            document.addEventListener('keydown', function(e) {
                // ESC键关闭模态框
                if (e.key === 'Escape') {
                    changePasswordBackdrop.style.display = 'none';
                }
                
                // Ctrl+S保存设置（需要阻止默认保存行为）
                if (e.ctrlKey && e.key === 's') {
                    e.preventDefault();
                    saveButton.click();
                }
            });
        });
    </script>
</body>
</html>
