<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课程选择 - 学生端</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="/css/common.css">
    <style>
        .course-card {
            background: var(--glass-bg);
            border-radius: var(--radius-lg);
            border: var(--glass-border);
            backdrop-filter: var(--glass-backdrop);
            box-shadow: var(--shadow);
            padding: var(--spacing-lg);
            margin-bottom: var(--spacing-lg);
            transition: transform var(--transition-normal), box-shadow var(--transition-normal);
        }

        .course-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg);
        }

        .course-header,
        .course-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: var(--spacing-md);
        }

        .course-title {
            font-size: var(--font-size-lg);
            font-weight: 600;
            margin: 0;
            color: var(--text-primary);
        }

        .course-code,
        .course-badge {
            display: inline-flex;
            align-items: center;
            background: var(--primary-color);
            color: #fff;
            padding: 0.25rem 0.5rem;
            border-radius: var(--radius-sm);
            font-size: var(--font-size-sm);
            font-weight: 500;
            white-space: nowrap;
        }

        .course-badge {
            background: var(--success-color);
        }

        .course-info,
        .course-stats,
        .course-actions {
            display: flex;
            gap: var(--spacing-md);
            flex-wrap: wrap;
            align-items: center;
        }

        .course-info {
            margin: var(--spacing-md) 0;
        }

        .course-info-item,
        .course-stat {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            color: var(--text-secondary);
            font-size: var(--font-size-sm);
        }

        .course-info-icon {
            color: var(--primary-color);
        }

        .course-description {
            color: var(--text-secondary);
            line-height: 1.6;
            margin: 0 0 var(--spacing-md);
        }

        .capacity-bar {
            width: 120px;
            height: 6px;
            background-color: var(--gray-200);
            border-radius: 999px;
            overflow: hidden;
        }

        .capacity-fill {
            height: 100%;
            border-radius: 999px;
        }

        .capacity-fill.low-capacity {
            background: var(--success-color);
        }

        .capacity-fill.medium-capacity {
            background: var(--warning-color);
        }

        .capacity-fill.high-capacity {
            background: var(--danger-color);
        }

        .search-container {
            display: flex;
            gap: var(--spacing-sm);
            width: min(420px, 100%);
        }

        .search-input {
            flex: 1;
            min-width: 0;
        }

        @media (max-width: 768px) {
            .course-header,
            .course-footer {
                align-items: flex-start;
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="page-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="/student/index.html" class="sidebar-brand">
                    <div class="sidebar-brand-icon"><i class="fas fa-graduation-cap"></i></div>
                    <span class="sidebar-brand-text">学生端</span>
                </a>
                <button class="sidebar-toggle" aria-label="收起侧栏"><i class="fas fa-chevron-left"></i></button>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-item"><a href="/student/index.html" class="nav-link"><i class="nav-icon fas fa-home"></i><span class="nav-text">首页</span></a></div>
                <div class="nav-item"><a href="/student/my-courses.html" class="nav-link"><i class="nav-icon fas fa-book"></i><span class="nav-text">我的课程</span></a></div>
                <div class="nav-item"><a href="/student/course-selection.html" class="nav-link active"><i class="nav-icon fas fa-search"></i><span class="nav-text">课程选择</span></a></div>
                <div class="nav-item"><a href="/student/grades.html" class="nav-link"><i class="nav-icon fas fa-chart-line"></i><span class="nav-text">成绩查询</span></a></div>
                <div class="nav-item"><a href="/student/profile.html" class="nav-link"><i class="nav-icon fas fa-user"></i><span class="nav-text">个人信息</span></a></div>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-navbar">
                <div class="nav-left">
                    <button class="mobile-sidebar-toggle" aria-label="切换侧栏"><i class="fas fa-bars"></i></button>
                    <h1 class="page-title">课程选择</h1>
                </div>
                <div class="nav-right">
                    <div class="user-profile">
                        <div class="user-avatar"><i class="fas fa-user"></i></div>
                        <div class="user-info">
                            <span class="user-name">学生</span>
                            <span class="user-role">Student</span>
                        </div>
                    </div>
                </div>
            </header>

            <div class="content-wrapper">
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">可选课程</h3>
                        <div class="search-container">
                            <input type="text" id="course-search" class="form-control search-input" placeholder="搜索课程名称或编号">
                            <button class="btn btn-primary search-button" type="button"><i class="fas fa-search"></i></button>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="courses-list"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="/js/common.js"></script>
    <script src="/js/app-api.js"></script>
    <script src="/js/student-courses.js"></script>
</body>
</html>
