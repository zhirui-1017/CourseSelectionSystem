    <style>
        /* 课程卡片样式 */
        .course-card {
            background: var(--glass-bg);
            border-radius: var(--radius-lg);
            border: var(--glass-border);
            backdrop-filter: var(--glass-backdrop);
            box-shadow: var(--shadow);
            padding: var(--spacing-lg);
            margin-bottom: var(--spacing-lg);
            transition: transform var(--transition-normal), box-shadow var(--transition-normal);
        }
        
        .course-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
        }
        
        .course-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-md);
        }
        
        .course-title {
            font-size: var(--font-size-lg);
            font-weight: 600;
            margin: 0;
            color: var(--text-primary);
        }
        
        .course-code {
            background: var(--primary-color);
            color: white;
            padding: 0.25rem 0.5rem;
            border-radius: var(--radius-sm);
            font-size: var(--font-size-sm);
            font-weight: 500;
        }
        
        .course-badge {
            background: var(--success-color);
            color: white;
            padding: 0.25rem 0.5rem;
            border-radius: var(--radius-sm);
            font-size: var(--font-size-sm);
            font-weight: 500;
        }
        
        .course-info {
            display: flex;
            gap: var(--spacing-lg);
            flex-wrap: wrap;
            margin-bottom: var(--spacing-md);
        }
        
        .course-info-item {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            color: var(--text-secondary);
        }
        
        .course-info-icon {
            color: var(--primary-color);
        }
        
        .course-description {
            color: var(--text-secondary);
            margin-bottom: var(--spacing-md);
            line-height: 1.6;
        }
        
        .course-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .course-actions {
            display: flex;
            gap: var(--spacing-sm);
        }
        
        .course-stats {
            display: flex;
            gap: var(--spacing-md);
        }
        
        .course-stat {
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
            font-size: var(--font-size-sm);
            color: var(--text-secondary);
        }
        
        /* 容量条样式 */
        .capacity-bar {
            width: 100px;
            height: 6px;
            background-color: var(--gray-200);
            border-radius: 3px;
            overflow: hidden;
            position: relative;
        }
        
        .capacity-fill {
            height: 100%;
            border-radius: 3px;
            transition: width var(--transition-normal);
        }
        
        .capacity-fill.high-capacity {
            background: linear-gradient(90deg, var(--danger-color), var(--warning-color));
        }
        
        .capacity-fill.medium-capacity {
            background: linear-gradient(90deg, var(--warning-color), var(--primary-color));
        }
        
        .capacity-fill.low-capacity {
            background: linear-gradient(90deg, var(--success-color), var(--primary-color));
        }
        
        /* 搜索和筛选样式 */
        .search-container {
            position: relative;
            width: 100%;
            max-width: 400px;
        }
        
        .search-input {
            width: 100%;
            padding: 0.75rem 3rem 0.75rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            font-size: var(--font-size-md);
            background: var(--glass-bg);
            backdrop-filter: var(--glass-backdrop);
            transition: border-color var(--transition-normal), box-shadow var(--transition-normal);
        }
        
        .search-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(52, 152, 219, 0.2);
        }
        
        .search-button {
            position: absolute;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            padding: 0.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color var(--transition-normal);
        }
        
        .search-button:hover {
            background-color: var(--primary-color-dark);
        }
        
        /* 筛选面板样式 */
        .filter-panel {
            background: var(--glass-bg);
            border-radius: var(--radius-lg);
            border: var(--glass-border);
            backdrop-filter: var(--glass-backdrop);
            padding: var(--spacing-lg);
            margin-bottom: var(--spacing-lg);
            box-shadow: var(--shadow-sm);
        }
        
        .filter-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            margin-bottom: var(--spacing-md);
            padding-bottom: var(--spacing-sm);
            border-bottom: 1px solid var(--border-color);
        }
        
        .filter-options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-md);
        }
        
        .filter-group {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-xs);
        }
        
        .filter-label {
            font-size: var(--font-size-sm);
            font-weight: 500;
            color: var(--text-secondary);
        }
        
        .filter-select, 
        .filter-input {
            padding: 0.5rem;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: var(--font-size-md);
            background: transparent;
            transition: border-color var(--transition-normal);
        }
        
        .filter-select:focus,
        .filter-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(52, 152, 219, 0.2);
        }
        
        .filter-actions {
            display: flex;
            gap: var(--spacing-sm);
            justify-content: flex-end;
        }
        
        /* 选课状态标签 */
        .enrollment-status {
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
            font-size: var(--font-size-sm);
            font-weight: 500;
            padding: 0.25rem 0.5rem;
            border-radius: var(--radius-sm);
        }
        
        .enrollment-status.available {
            background-color: var(--success-color-light);
            color: var(--success-color);
        }
        
        .enrollment-status.limited {
            background-color: var(--warning-color-light);
            color: var(--warning-color);
        }
        
        .enrollment-status.full {
            background-color: var(--danger-color-light);
            color: var(--danger-color);
        }
        
        /* 选课提示样式 */
        .selection-summary {
            background: var(--info-color-light);
            border: 1px solid var(--info-color);
            border-radius: var(--radius-md);
            padding: var(--spacing-md);
            margin-bottom: var(--spacing-lg);
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
        }
        
        .selection-summary-icon {
            font-size: var(--font-size-xl);
            color: var(--info-color);
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .course-footer {
                flex-direction: column;
                align-items: flex-start;
                gap: var(--spacing-md);
            }
            
            .course-actions {
                width: 100%;
                justify-content: space-between;
            }
            
            .filter-options {
                grid-template-columns: 1fr;
            }
            
            .selection-summary {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>

    <script>
        // 筛选面板展开/收起功能
        document.addEventListener('DOMContentLoaded', function() {
            const filterTitle = document.querySelector('.filter-title');
            const filterOptions = document.querySelector('.filter-options');
            const filterToggle = document.querySelector('.filter-toggle');
            
            // 默认展开筛选面板
            filterOptions.style.display = 'grid';
            
            filterTitle.addEventListener('click', function() {
                if (filterOptions.style.display === 'grid') {
                    filterOptions.style.display = 'none';
                    filterToggle.classList.remove('fa-chevron-down');
                    filterToggle.classList.add('fa-chevron-up');
                } else {
                    filterOptions.style.display = 'grid';
                    filterToggle.classList.remove('fa-chevron-up');
                    filterToggle.classList.add('fa-chevron-down');
                }
            });
            
            // 简单的选课按钮点击效果
            const enrollButtons = document.querySelectorAll('.btn-primary');
            enrollButtons.forEach(button => {
                if (!button.disabled) {
                    button.addEventListener('click', function() {
                        alert('选课成功！');
                    });
                }
            });
        });
    </script>
