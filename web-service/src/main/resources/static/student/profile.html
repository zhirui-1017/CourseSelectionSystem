    <style>
        /* 个人信息容器样式 */
        .profile-container {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: var(--spacing-xl);
            margin-bottom: var(--spacing-xl);
        }
        
        /* 个人资料卡片样式 */
        .profile-card {
            background: var(--glass-bg);
            border-radius: var(--radius-lg);
            border: var(--glass-border);
            backdrop-filter: var(--glass-backdrop);
            box-shadow: var(--shadow);
            padding: var(--spacing-xl);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            position: sticky;
            top: var(--top-nav-height);
        }
        
        .profile-avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid var(--white);
            box-shadow: var(--shadow);
            background-color: var(--gray-200);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: var(--spacing-lg);
            position: relative;
            overflow: hidden;
        }
        
        .profile-avatar i {
            font-size: 3rem;
            color: var(--gray-400);
        }
        
        .avatar-upload-button {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--primary-color);
            color: var(--white);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 2px solid var(--white);
            box-shadow: var(--shadow);
            transition: background-color var(--transition-normal);
        }
        
        .avatar-upload-button:hover {
            background-color: var(--primary-dark);
        }
        
        .avatar-upload-input {
            display: none;
        }
        
        .profile-name {
            font-size: var(--font-size-lg);
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: var(--spacing-xs);
        }
        
        .profile-role {
            font-size: var(--font-size-sm);
            color: var(--text-secondary);
            margin-bottom: var(--spacing-md);
        }
        
        .profile-id {
            font-size: var(--font-size-sm);
            color: var(--text-secondary);
            margin-bottom: var(--spacing-lg);
        }
        
        .profile-bio {
            font-size: var(--font-size-sm);
            color: var(--text-primary);
            line-height: 1.5;
            margin-bottom: var(--spacing-lg);
        }
        
        .profile-stats {
            width: 100%;
            display: flex;
            justify-content: space-around;
            margin-bottom: var(--spacing-lg);
            padding: var(--spacing-md) 0;
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
        }
        
        .profile-stat {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .stat-value {
            font-size: var(--font-size-lg);
            font-weight: 600;
            color: var(--primary-color);
        }
        
        .stat-label {
            font-size: var(--font-size-xs);
            color: var(--text-secondary);
        }
        
        .profile-actions {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: var(--spacing-md);
        }
        
        /* 信息详情样式 */
        .profile-details {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-xl);
        }
        
        .info-section {
            background: var(--glass-bg);
            border-radius: var(--radius-lg);
            border: var(--glass-border);
            backdrop-filter: var(--glass-backdrop);
            box-shadow: var(--shadow);
            padding: var(--spacing-xl);
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-lg);
            padding-bottom: var(--spacing-md);
            border-bottom: 1px solid var(--border-color);
        }
        
        .section-title {
            font-size: var(--font-size-lg);
            font-weight: 600;
            color: var(--text-primary);
            margin: 0;
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }
        
        .section-title i {
            color: var(--primary-color);
        }
        
        .edit-section-button {
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
            padding: var(--spacing-sm) var(--spacing-md);
            background-color: var(--white);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: var(--font-size-sm);
            cursor: pointer;
            transition: all var(--transition-normal);
        }
        
        .edit-section-button:hover {
            background-color: var(--primary-light);
            border-color: var(--primary-color);
            color: var(--primary-color);
        }
        
        /* 信息列表样式 */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: var(--spacing-lg);
        }
        
        .info-item {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-xs);
        }
        
        .info-label {
            font-size: var(--font-size-sm);
            color: var(--text-secondary);
            font-weight: 500;
        }
        
        .info-value {
            font-size: var(--font-size-sm);
            color: var(--text-primary);
            word-break: break-word;
        }
        
        /* 表单样式 */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: var(--spacing-lg);
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-xs);
        }
        
        .form-label {
            font-size: var(--font-size-sm);
            color: var(--text-secondary);
            font-weight: 500;
        }
        
        .form-input, 
        .form-select, 
        .form-textarea {
            padding: var(--spacing-sm) var(--spacing-md);
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            background-color: var(--white);
            font-size: var(--font-size-sm);
            transition: border-color var(--transition-normal);
        }
        
        .form-input:focus, 
        .form-select:focus, 
        .form-textarea:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        
        .form-textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: var(--spacing-md);
            margin-top: var(--spacing-xl);
            padding-top: var(--spacing-lg);
            border-top: 1px solid var(--border-color);
        }
        
        /* 教育经历样式 */
        .education-item {
            padding: var(--spacing-lg);
            background-color: var(--white);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
            margin-bottom: var(--spacing-lg);
            position: relative;
        }
        
        .education-item:last-child {
            margin-bottom: 0;
        }
        
        .education-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: var(--spacing-md);
        }
        
        .education-info h4 {
            font-size: var(--font-size-md);
            font-weight: 600;
            color: var(--text-primary);
            margin: 0 0 var(--spacing-xs) 0;
        }
        
        .education-info p {
            font-size: var(--font-size-sm);
            color: var(--text-secondary);
            margin: 0;
        }
        
        .education-date {
            font-size: var(--font-size-sm);
            color: var(--primary-color);
            font-weight: 500;
        }
        
        /* 技能标签样式 */
        .skills-container {
            display: flex;
            flex-wrap: wrap;
            gap: var(--spacing-sm);
            margin-bottom: var(--spacing-lg);
        }
        
        .skill-tag {
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-xs);
            padding: var(--spacing-xs) var(--spacing-sm);
            background-color: var(--primary-light);
            color: var(--primary-color);
            border-radius: 50px;
            font-size: var(--font-size-xs);
            font-weight: 500;
        }
        
        .add-skill-button {
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-xs);
            padding: var(--spacing-xs) var(--spacing-sm);
            background-color: var(--gray-100);
            color: var(--text-secondary);
            border-radius: 50px;
            font-size: var(--font-size-xs);
            cursor: pointer;
            transition: all var(--transition-normal);
        }
        
        .add-skill-button:hover {
            background-color: var(--gray-200);
            color: var(--text-primary);
        }
        
        /* 密码修改表单样式 */
        .password-form {
            max-width: 500px;
        }
        
        /* 模态框样式 */
        .modal-backdrop {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal {
            background: var(--glass-bg);
            border-radius: var(--radius-lg);
            border: var(--glass-border);
            backdrop-filter: var(--glass-backdrop);
            box-shadow: var(--shadow-lg);
            padding: var(--spacing-xl);
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-lg);
            padding-bottom: var(--spacing-md);
            border-bottom: 1px solid var(--border-color);
        }
        
        .modal-title {
            font-size: var(--font-size-lg);
            font-weight: 600;
            color: var(--text-primary);
            margin: 0;
        }
        
        .close-modal-button {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: var(--text-secondary);
            cursor: pointer;
            padding: var(--spacing-xs);
            transition: color var(--transition-normal);
        }
        
        .close-modal-button:hover {
            color: var(--text-primary);
        }
        
        /* 移动端响应式 */
        @media (max-width: 992px) {
            .profile-container {
                grid-template-columns: 1fr;
            }
            
            .profile-card {
                position: static;
            }
        }
        
        @media (max-width: 768px) {
            .info-grid, 
            .form-grid {
                grid-template-columns: 1fr;
            }
            
            .form-actions {
                flex-direction: column;
            }
            
            .modal {
                width: 95%;
                padding: var(--spacing-lg);
            }
        }
    </style>
</head>

                <h3 class="modal-title">编辑个人资料</h3>
                <button class="close-modal-button close-edit-profile-modal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <form id="edit-profile-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label">姓名 *</label>
                        <input type="text" class="form-input" name="name" value="张三" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">性别 *</label>
                        <select class="form-select" name="gender" required>
                            <option value="male" selected>男</option>
                            <option value="female">女</option>
                            <option value="other">其他</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">出生日期 *</label>
                        <input type="date" class="form-input" name="birthdate" value="2003-05-15" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">民族 *</label>
                        <select class="form-select" name="nationality" required>
                            <option value="汉族" selected>汉族</option>
                            <option value="蒙古族">蒙古族</option>
                            <option value="回族">回族</option>
                            <option value="藏族">藏族</option>
                            <option value="维吾尔族">维吾尔族</option>
                            <option value="其他">其他</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">政治面貌 *</label>
                        <select class="form-select" name="political" required>
                            <option value="共青团员" selected>共青团员</option>
                            <option value="中共党员">中共党员</option>
                            <option value="中共预备党员">中共预备党员</option>
                            <option value="群众">群众</option>
                            <option value="其他">其他</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">个人简介</label>
                        <textarea class="form-textarea" name="bio">热爱编程，对人工智能和机器学习有浓厚兴趣，希望成为一名优秀的软件工程师。</textarea>
                    </div>
                </div>
                
                <div class="form-actions">
                    <button type="button" class="btn btn-outline-secondary close-edit-profile-modal">取消</button>
                    <button type="submit" class="btn btn-primary">保存更改</button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- 修改密码模态框 --<div class="modal-backdrop change-password-modal-backdrop">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">修改密码</h3>
                <button class="close-modal-button close-change-password-modal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form id="change-password-form" class="password-form">
                <div class="form-group">
                    <label class="form-label">当前密码 *</label>
                    <input type="password" class="form-input" name="current-password" required>
                </div>
                <div class="form-group">
                    <label class="form-label">新密码 *</label>
                    <input type="password" class="form-input" name="new-password" required minlength="8">
                </div>
                <div class="form-group">
                    <label class="form-label">确认新密码 *</label>
                    <input type="password" class="form-input" name="confirm-password" required minlength="8">
                </div>
                
                <div class="form-actions">
                    <button type="button" class="btn btn-outline-secondary close-change-password-modal">取消</button>
                    <button type="submit" class="btn btn-primary">修改密码</button>
                </div>
            </form>
        </div>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 获取DOM元素
            const editProfileButton = document.querySelector('.edit-profile-button');
            const changePasswordButton = document.querySelector('.change-password-button');
            const editBasicInfoButton = document.querySelector('.edit-basic-info-button');
            const editContactButton = document.querySelector('.edit-contact-button');
            const editEducationButton = document.querySelector('.edit-education-button');
            const editSkillsButton = document.querySelector('.edit-skills-button');
            const avatarUploadInput = document.querySelector('.avatar-upload-input');
            
            // 模态框元素
            const editProfileModalBackdrop = document.querySelector('.edit-profile-modal-backdrop');
            const changePasswordModalBackdrop = document.querySelector('.change-password-modal-backdrop');
            const closeEditProfileModalButtons = document.querySelectorAll('.close-edit-profile-modal');
            const closeChangePasswordModalButtons = document.querySelectorAll('.close-change-password-modal');
            
            // 表单元素
            const editProfileForm = document.getElementById('edit-profile-form');
            const changePasswordForm = document.getElementById('change-password-form');
            
            // 打开编辑个人资料模态框
            function openEditProfileModal() {
                editProfileModalBackdrop.style.display = 'flex';
                editProfileModalBackdrop.querySelector('.modal').scrollTop = 0;
            }
            
            // 关闭编辑个人资料模态框
            function closeEditProfileModal() {
                editProfileModalBackdrop.style.display = 'none';
            }
            
            // 打开修改密码模态框
            function openChangePasswordModal() {
                changePasswordModalBackdrop.style.display = 'flex';
                changePasswordModalBackdrop.querySelector('.modal').scrollTop = 0;
            }
            
            // 关闭修改密码模态框
            function closeChangePasswordModal() {
                changePasswordModalBackdrop.style.display = 'none';
                changePasswordForm.reset();
            }
            
            // 头像上传处理
            avatarUploadInput.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    // 在实际应用中，这里应该上传头像文件到服务器
                    console.log('上传头像文件:', file.name);
                    alert('头像上传成功！');
                    
                    // 模拟更新头像预览
                    const profileAvatar = document.querySelector('.profile-avatar');
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        profileAvatar.innerHTML = `<img src="${event.target.result}" alt="头像" style="width: 100%; height: 100%; object-fit: cover; border-radius: 50%;">`;
                        profileAvatar.innerHTML += `
                            <label class="avatar-upload-button">
                                <i class="fas fa-camera"></i>
                                <input type="file" class="avatar-upload-input" accept="image/*">
                            </label>
                        `;
                    };
                    reader.readAsDataURL(file);
                }
            });
            
            // 事件监听器
            editProfileButton.addEventListener('click', openEditProfileModal);
            editBasicInfoButton.addEventListener('click', openEditProfileModal);
            changePasswordButton.addEventListener('click', openChangePasswordModal);
            
            closeEditProfileModalButtons.forEach(button => {
                button.addEventListener('click', closeEditProfileModal);
            });
            
            closeChangePasswordModalButtons.forEach(button => {
                button.addEventListener('click', closeChangePasswordModal);
            });
            
            // 点击模态框背景关闭
            editProfileModalBackdrop.addEventListener('click', function(e) {
                if (e.target === this) {
                    closeEditProfileModal();
                }
            });
            
            changePasswordModalBackdrop.addEventListener('click', function(e) {
                if (e.target === this) {
                    closeChangePasswordModal();
                }
            });
            
            // 提交编辑个人资料表单
            editProfileForm.addEventListener('submit', function(e) {
                e.preventDefault();
                
                // 收集表单数据
                const formData = {
                    name: this.querySelector('input[name="name"]').value,
                    gender: this.querySelector('select[name="gender"]').value,
                    birthdate: this.querySelector('input[name="birthdate"]').value,
                    nationality: this.querySelector('select[name="nationality"]').value,
                    political: this.querySelector('select[name="political"]').value,
                    bio: this.querySelector('textarea[name="bio"]').value
                };
                
                // 在实际应用中，这里应该发送表单数据到服务器
                console.log('个人资料数据:', formData);
                
                alert('个人资料更新成功！');
                closeEditProfileModal();
                
                // 模拟更新页面数据
                document.querySelector('.profile-name').textContent = formData.name;
                document.querySelector('.profile-bio').textContent = formData.bio;
                
                // 更新其他基本信息
                document.querySelector('.info-item:nth-child(1) .info-value').textContent = formData.name;
                document.querySelector('.info-item:nth-child(2) .info-value').textContent = formData.gender === 'male' ? '男' : (formData.gender === 'female' ? '女' : '其他');
                document.querySelector('.info-item:nth-child(3) .info-value').textContent = formData.birthdate;
                document.querySelector('.info-item:nth-child(4) .info-value').textContent = formData.nationality;
                document.querySelector('.info-item:nth-child(5) .info-value').textContent = formData.political;
            });
            
            // 提交修改密码表单
            changePasswordForm.addEventListener('submit', function(e) {
                e.preventDefault();
                
                const currentPassword = this.querySelector('input[name="current-password"]').value;
                const newPassword = this.querySelector('input[name="new-password"]').value;
                const confirmPassword = this.querySelector('input[name="confirm-password"]').value;
                
                // 验证密码
                if (newPassword !== confirmPassword) {
                    alert('两次输入的新密码不一致，请重新输入！');
                    return;
                }
                
                if (newPassword.length < 8) {
                    alert('新密码长度不能少于8个字符！');
                    return;
                }
                
                // 在实际应用中，这里应该发送密码修改请求到服务器
                console.log('密码修改请求:', { currentPassword, newPassword });
                
                alert('密码修改成功！请重新登录！');
                closeChangePasswordModal();
                // 在实际应用中，这里应该跳转到登录页面
            });
            
            // 编辑联系方式按钮点击事件
            editContactButton.addEventListener('click', function() {
                alert('编辑联系方式功能将在后续版本中提供！');
            });
            
            // 编辑教育经历按钮点击事件
            editEducationButton.addEventListener('click', function() {
                alert('编辑教育经历功能将在后续版本中提供！');
            });
            
            // 编辑技能按钮点击事件
            editSkillsButton.addEventListener('click', function() {
                alert('编辑技能功能将在后续版本中提供！');
            });
        });
    </script>
</body>
</html>
