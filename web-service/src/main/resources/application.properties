spring.application.name=web-service
server.port=8080
server.servlet.context-path=/

# 数据库配置
spring.datasource.url=jdbc:mysql://localhost:3306/course_selection_system?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis / MyBatis-Plus 配置
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.mapper-locations=classpath:mapper/*.xml

# JPA 保留用于兼容第一阶段迁移中的旧 Repository。
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

# 日志配置
logging.level.org.example.courseselectionsystem=INFO
logging.level.org.springframework.security=INFO

# Thymeleaf 模板配置
spring.thymeleaf.cache=false
spring.thymeleaf.enabled=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8

# 服务注册与发现
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=false
eureka.instance.instance-id=${spring.application.name}:${server.port}

# Actuator 监控端点
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
