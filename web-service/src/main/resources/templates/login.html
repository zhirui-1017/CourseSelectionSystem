<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网上选课系统 - 登录</title>
    <!-- 引入Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" media="print" onload="this.media='all'">
    <style>
        body {
            background-color: #f5f5f5;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            width: 400px;
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .login-header {
            text-align: center;
            margin-bottom: 20px;
        }
        .login-header h2 {
            color: #333;
        }
        .login-footer {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            color: #666;
        }
        .form-check-inline {
            margin-right: 15px;
        }
        .error-message {
            color: #dc3545;
            font-size: 14px;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h2>网上选课系统</h2>
            <p>请登录您的账号</p>
        </div>
        <form id="loginForm">
            <div class="mb-3">
                <label for="username" class="form-label">用户名</label>
                <input type="text" class="form-control" id="username" name="username" placeholder="请输入学号/工号" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">密码</label>
                <input type="password" class="form-control" id="password" name="password" placeholder="请输入密码" required>
            </div>
            <div class="mb-3">
                <label class="form-label">角色</label>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="role" id="student" value="student" checked>
                    <label class="form-check-label" for="student">学生</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="role" id="teacher" value="teacher">
                    <label class="form-check-label" for="teacher">教师</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="role" id="admin" value="admin">
                    <label class="form-check-label" for="admin">管理员</label>
                </div>
            </div>
            <div id="errorDiv" class="error-message" style="display: none;"></div>
            <button type="submit" class="btn btn-primary w-100">登录</button>
        </form>
        <div class="login-footer">
            <p>© 2024 网上选课系统 版权所有</p>
        </div>
    </div>
    
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const role = document.querySelector('input[name="role"]:checked')?.value || 'student';
            const errorDiv = document.getElementById('errorDiv');

            if (!username || !password) {
                errorDiv.textContent = '请填写用户名和密码';
                errorDiv.style.display = 'block';
                return;
            }

            errorDiv.style.display = 'none';

            try {
                const response = await fetch('/login/auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({ username, password, role })
                });
                const result = await response.json();
                if (result.code === 200) {
                    window.location.href = result.data;
                    return;
                }
                errorDiv.textContent = result.message || '登录失败';
                errorDiv.style.display = 'block';
            } catch (error) {
                errorDiv.textContent = '登录请求失败，请稍后重试';
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
