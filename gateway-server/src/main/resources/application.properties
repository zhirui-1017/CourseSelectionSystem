spring.application.name=gateway-server
server.port=9000

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.routes[0].id=course-service
spring.cloud.gateway.routes[0].uri=lb://course-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/courses/**,/api/v1/colleges/**,/api/v1/departments/**,/api/v1/majors/**
spring.cloud.gateway.routes[0].filters[0].name=CircuitBreaker
spring.cloud.gateway.routes[0].filters[0].args.name=courseServiceCircuitBreaker
spring.cloud.gateway.routes[0].filters[0].args.fallbackUri=forward:/fallback

spring.cloud.gateway.routes[1].id=selection-service
spring.cloud.gateway.routes[1].uri=lb://selection-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/selections/**,/api/v1/course-selections/**
spring.cloud.gateway.routes[1].filters[0].name=CircuitBreaker
spring.cloud.gateway.routes[1].filters[0].args.name=selectionServiceCircuitBreaker
spring.cloud.gateway.routes[1].filters[0].args.fallbackUri=forward:/fallback

spring.cloud.gateway.routes[2].id=web-service-legacy
spring.cloud.gateway.routes[2].uri=lb://web-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/,/login/**,/admin/**,/student/**,/teacher/**,/static/**,/css/**,/js/**,/images/**,/webjars/**,/api/v1/**
spring.cloud.gateway.routes[2].filters[0].name=CircuitBreaker
spring.cloud.gateway.routes[2].filters[0].args.name=webServiceCircuitBreaker
spring.cloud.gateway.routes[2].filters[0].args.fallbackUri=forward:/fallback

resilience4j.timelimiter.configs.default.timeout-duration=5s
resilience4j.circuitbreaker.configs.default.sliding-window-size=10
resilience4j.circuitbreaker.configs.default.failure-rate-threshold=50

management.endpoints.web.exposure.include=health,info,gateway
management.endpoint.health.show-details=always
